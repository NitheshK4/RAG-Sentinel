<svg xmlns="http://www.w3.org/2000/svg" width="850" height="160" viewBox="0 0 850 160">
  <defs>
    <linearGradient id="bg-pipe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="850" height="160" fill="url(#bg-pipe)" rx="10"/>
  <rect x="1" y="1" width="848" height="158" rx="10" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Stage labels -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b8b9a" text-anchor="middle">
    <text x="60" y="22">SOURCE</text>
    <text x="60" y="32">TRIAGE</text>
    <text x="180" y="22">CHUNK</text>
    <text x="180" y="32">AUDIT</text>
    <text x="300" y="22">NEIGHBOR</text>
    <text x="300" y="32">AUDIT</text>
    <text x="420" y="22">RETRIEVAL</text>
    <text x="420" y="32">TRACE</text>
    <text x="540" y="22">ATTACK</text>
    <text x="540" y="32">HYPOTHESIS</text>
    <text x="660" y="22">INCIDENT</text>
    <text x="660" y="32">REPORT</text>
    <text x="780" y="22">REMEDIATION</text>
    <text x="780" y="32">PLAN</text>
  </g>

  <!-- Pipeline nodes -->
  <!-- Node 1 -->
  <circle cx="60" cy="80" r="18" fill="#0d1117" stroke="#00d4ff" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#00d4ff">📥</text>

  <!-- Node 2 -->
  <circle cx="180" cy="80" r="18" fill="#0d1117" stroke="#00d4ff" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <text x="180" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#00d4ff">🔬</text>

  <!-- Node 3 -->
  <circle cx="300" cy="80" r="18" fill="#0d1117" stroke="#ff6b35" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <text x="300" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff6b35">🔍</text>

  <!-- Node 4 -->
  <circle cx="420" cy="80" r="18" fill="#0d1117" stroke="#ff6b35" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <text x="420" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff6b35">📊</text>

  <!-- Node 5 -->
  <circle cx="540" cy="80" r="18" fill="#0d1117" stroke="#ff3b3b" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.6s"/>
  </circle>
  <text x="540" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff3b3b">⚡</text>

  <!-- Node 6 -->
  <circle cx="660" cy="80" r="18" fill="#0d1117" stroke="#ff3b3b" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <text x="660" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff3b3b">📋</text>

  <!-- Node 7 -->
  <circle cx="780" cy="80" r="18" fill="#0d1117" stroke="#00ff88" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2.4s"/>
  </circle>
  <text x="780" y="84" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">🛡️</text>

  <!-- Connection lines -->
  <line x1="78" y1="80" x2="162" y2="80" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="198" y1="80" x2="282" y2="80" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="318" y1="80" x2="402" y2="80" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>
  <line x1="438" y1="80" x2="522" y2="80" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>
  <line x1="558" y1="80" x2="642" y2="80" stroke="#ff3b3b" stroke-width="1" opacity="0.3"/>
  <line x1="678" y1="80" x2="762" y2="80" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- Traveling data packet -->
  <circle r="4" fill="#00d4ff" opacity="0.9" filter="url(#g2)">
    <animateMotion dur="5s" repeatCount="indefinite" path="M60,80 L180,80 L300,80 L420,80 L540,80 L660,80 L780,80"/>
    <animate attributeName="fill" values="#00d4ff;#00d4ff;#ff6b35;#ff6b35;#ff3b3b;#ff3b3b;#00ff88" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.7;0.9;0.7;0.9;0.7;0.9" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase labels at bottom -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="9" text-anchor="middle" font-weight="600">
    <text x="120" y="130" fill="#00d4ff" opacity="0.7">INGESTION</text>
    <rect x="75" y="133" width="90" height="1" fill="#00d4ff" opacity="0.2"/>
    <text x="360" y="130" fill="#ff6b35" opacity="0.7">DETECTION</text>
    <rect x="310" y="133" width="100" height="1" fill="#ff6b35" opacity="0.2"/>
    <text x="600" y="130" fill="#ff3b3b" opacity="0.7">REPORTING</text>
    <rect x="550" y="133" width="100" height="1" fill="#ff3b3b" opacity="0.2"/>
    <text x="780" y="130" fill="#00ff88" opacity="0.7">REMEDIATION</text>
    <rect x="725" y="133" width="110" height="1" fill="#00ff88" opacity="0.2"/>
  </g>

  <!-- "9 AI PIPELINES" badge -->
  <rect x="340" y="142" width="170" height="16" rx="8" fill="#00d4ff" opacity="0.1" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="425" y="153" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#00d4ff" opacity="0.7" letter-spacing="2">9 AI-POWERED PIPELINES</text>
</svg>
